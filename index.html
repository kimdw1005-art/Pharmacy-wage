<title>Pharmacy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f5f5f0;color:#1a1a1a}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:#f5f5f0;padding:0 0 40px}

/* header */
.header{background:#fff;padding:16px 20px 14px;border-bottom:1px solid #ebebeb;position:sticky;top:0;z-index:10}
.header-title{font-size:17px;font-weight:700;color:#1a1a1a;letter-spacing:-0.3px}
.header-sub{font-size:11px;color:#aaa;margin-top:2px}

/* rate cards */
.rate-section{padding:16px 16px 0}
.rate-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.rate-card{border-radius:14px;padding:12px 12px 10px;border:1px solid transparent}
.rate-card.wk{background:#eaf3de;border-color:#c0dd97}
.rate-card.we{background:#e6f1fb;border-color:#b5d4f4}
.rate-card.hol{background:#fbeaf0;border-color:#f4c0d1}
.rate-lbl{font-size:10px;font-weight:600;margin-bottom:6px;letter-spacing:0.2px}
.rate-card.wk .rate-lbl{color:#3b6d11}
.rate-card.we .rate-lbl{color:#0c447c}
.rate-card.hol .rate-lbl{color:#993556}
.rate-inp-wrap{display:flex;align-items:baseline;gap:2px;background:rgba(255,255,255,0.75);border-radius:8px;padding:5px 8px;border:1px solid rgba(0,0,0,0.07)}
.rate-inp-wrap input{border:none;background:transparent;font-size:14px;font-weight:700;width:100%;outline:none;min-width:0;font-family:inherit}
.rate-card.wk .rate-inp-wrap input{color:#27500a}
.rate-card.we .rate-inp-wrap input{color:#0c447c}
.rate-card.hol .rate-inp-wrap input{color:#72243e}
.rate-unit{font-size:11px;font-weight:500;flex-shrink:0}
.rate-card.wk .rate-unit{color:#3b6d11}
.rate-card.we .rate-unit{color:#185fa5}
.rate-card.hol .rate-unit{color:#993556}

/* summary */
.summary-section{padding:12px 16px 0}
.summary-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.s-card{background:#fff;border-radius:14px;padding:13px 14px;border:1px solid #ebebeb}
.s-label{font-size:11px;color:#999;margin-bottom:4px;font-weight:500}
.s-value{font-size:20px;font-weight:700;color:#1a1a1a;letter-spacing:-0.5px}
.s-value.green{color:#1a8f60}
.s-value.blue{color:#185fa5}

/* calendar */
.cal-section{padding:12px 16px 0}
.cal-card{background:#fff;border-radius:16px;border:1px solid #ebebeb;overflow:hidden}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px}
.cal-month{font-size:16px;font-weight:700;letter-spacing:-0.3px}
.cal-nav button{background:none;border:1px solid #e5e5e5;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:16px;color:#555;display:flex;align-items:center;justify-content:center}
.cal-nav button:active{background:#f5f5f5}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);padding:0 8px 6px}
.cal-head span{font-size:10px;font-weight:600;text-align:center;color:#aaa;padding:3px 0}
.cal-head span.ch-sun{color:#e24b4a}
.cal-head span.ch-sat{color:#185fa5}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:0 8px 12px;gap:2px}
.day{border-radius:10px;padding:3px 2px;min-height:58px;cursor:pointer;transition:background 0.12s;position:relative}
.day:active{background:#f0f0f0}
.day.other{opacity:0.25;pointer-events:none}
.day.bs{opacity:0.15;pointer-events:none}
.day-num{font-size:11px;font-weight:600;color:#1a1a1a;width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin:0 auto 2px}
.day.today .day-num{background:#1a8f60;color:#fff;border-radius:50%}
.day.dsun .day-num{color:#e24b4a}
.day.dsat .day-num{color:#185fa5}
.day.dhol .day-num{color:#d4537e}
.hol-nm{font-size:8px;color:#993556;text-align:center;line-height:1.2;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 2px}
.day.confirmed{background:rgba(26,143,96,0.09)}
.day.scheduled{background:rgba(24,95,165,0.07)}
.day.absent{background:rgba(226,75,74,0.07)}
.day.hw{background:#fbeaf0}
.day.hs{background:rgba(212,83,126,0.05)}
.dbadge{font-size:9px;line-height:1.4;text-align:center;font-weight:600}
.dbadge.g{color:#1a8f60}.dbadge.b{color:#185fa5}.dbadge.p{color:#72243e}.dbadge.r{color:#a32d2d}

/* legend */
.legend{display:flex;gap:12px;padding:10px 16px 0;flex-wrap:wrap}
.legend span{font-size:10.5px;color:#888;display:flex;align-items:center;gap:4px}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.dot-g{background:#1a8f60}.dot-b{background:#185fa5}.dot-r{background:#e24b4a}.dot-p{background:#d4537e}

/* log */
.log-section{padding:12px 16px 0}
.log-card{background:#fff;border-radius:16px;border:1px solid #ebebeb;padding:14px 16px}
.log-title{font-size:13px;font-weight:700;color:#888;margin-bottom:10px}
.log-row{display:grid;grid-template-columns:44px 50px 1fr 48px 70px;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:12px}
.log-row:last-child{border-bottom:none}
.log-hdr{font-size:10px;color:#bbb;padding-bottom:4px}

/* modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:22px 22px 0 0;padding:20px 20px 40px;width:100%;max-width:480px}
.modal-handle{width:36px;height:4px;background:#e0e0e0;border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px;letter-spacing:-0.3px}
.hol-tag{display:inline-flex;align-items:center;gap:4px;background:#fbeaf0;color:#72243e;font-size:11px;font-weight:600;padding:3px 10px;border-radius:8px;margin-bottom:14px;border:1px solid #f4c0d1}
.field{margin-bottom:14px}
.field label{font-size:12px;color:#999;display:block;margin-bottom:5px;font-weight:600;letter-spacing:0.2px}
.field select,.field input[type=time]{width:100%;padding:11px 12px;font-size:15px;border:1.5px solid #e8e8e8;border-radius:12px;background:#fafafa;color:#1a1a1a;font-family:inherit;outline:none;-webkit-appearance:none}
.field select:focus,.field input[type=time]:focus{border-color:#1a8f60;background:#fff}
.modal-preview{font-size:13px;color:#1a8f60;margin:4px 0 16px;min-height:18px;font-weight:600}
.modal-actions{display:flex;gap:8px}
.btn-save{flex:1;padding:14px;background:#1a8f60;color:#fff;border:none;border-radius:13px;cursor:pointer;font-size:15px;font-weight:700;font-family:inherit}
.btn-save:active{background:#158050}
.btn-cancel{padding:14px 16px;background:#f5f5f5;border:none;border-radius:13px;cursor:pointer;font-size:15px;color:#555;font-family:inherit}
.btn-del{padding:14px 12px;background:#fff5f5;border:1.5px solid #ffd0d0;border-radius:13px;cursor:pointer;font-size:14px;color:#e24b4a;font-family:inherit}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-title">🏥 메디팜 동아약국</div>
    <div class="header-sub">근무일지 · 시작일 2026.05.12</div>
  </div>

  <div class="rate-section">
    <div class="rate-grid">
      <div class="rate-card wk">
        <div class="rate-lbl">평일 시급</div>
        <div class="rate-inp-wrap">
          <input type="text" id="rate-weekday" value="15,000" inputmode="numeric">
          <span class="rate-unit">원</span>
        </div>
      </div>
      <div class="rate-card we">
        <div class="rate-lbl">주말 시급</div>
        <div class="rate-inp-wrap">
          <input type="text" id="rate-weekend" value="18,000" inputmode="numeric">
          <span class="rate-unit">원</span>
        </div>
      </div>
      <div class="rate-card hol">
        <div class="rate-lbl">공휴일 시급</div>
        <div class="rate-inp-wrap">
          <input type="text" id="rate-holiday" value="18,000" inputmode="numeric">
          <span class="rate-unit">원</span>
        </div>
      </div>
    </div>
  </div>

  <div class="summary-section">
    <div class="summary-grid">
      <div class="s-card"><div class="s-label">근무일수</div><div class="s-value" id="sum-days">0일</div></div>
      <div class="s-card"><div class="s-label">총 근무시간</div><div class="s-value" id="sum-hours">0시간</div></div>
      <div class="s-card"><div class="s-label">확정 급여</div><div class="s-value green" id="sum-confirmed">0원</div></div>
      <div class="s-card"><div class="s-label">예정 포함</div><div class="s-value blue" id="sum-expected">0원</div></div>
    </div>
  </div>

  <div class="legend">
    <span><span class="dot dot-g"></span>출근</span>
    <span><span class="dot dot-b"></span>예정</span>
    <span><span class="dot dot-r"></span>결근</span>
    <span><span class="dot dot-p"></span>공휴일 근무</span>
  </div>

  <div class="cal-section">
    <div class="cal-card">
      <div class="cal-nav">
        <button id="prev-m">&#8249;</button>
        <span class="cal-month" id="month-label"></span>
        <button id="next-m">&#8250;</button>
      </div>
      <div class="cal-head">
        <span class="ch-sun">일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span class="ch-sat">토</span>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>

  <div class="log-section" id="log-section" style="display:none">
    <div class="log-card">
      <div class="log-title">이번 달 근무 기록</div>
      <div class="log-row log-hdr">
        <span>날짜</span><span>유형</span><span>시간</span><span>근무h</span><span style="text-align:right">급여</span>
      </div>
      <div id="log-list"></div>
    </div>
  </div>
</div>

<!-- modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">근무 입력</div>
    <div id="hol-tag-wrap"></div>
    <div class="field">
      <label>상태</label>
      <select id="inp-status">
        <option value="confirmed">✅ 출근</option>
        <option value="scheduled">📅 예정</option>
        <option value="absent">❌ 결근</option>
      </select>
    </div>
    <div class="field"><label>출근 시간</label><input type="time" id="inp-start" value="09:00"></div>
    <div class="field"><label>퇴근 시간</label><input type="time" id="inp-end" value="18:00"></div>
    <div class="modal-preview" id="modal-preview"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="m-cancel">취소</button>
      <button class="btn-del" id="m-delete" style="display:none">삭제</button>
      <button class="btn-save" id="m-save">저장</button>
    </div>
  </div>
</div>

<script>
const SK='alba_dongah_v1';
const START=new Date(2026,4,12); START.setHours(0,0,0,0);
const HOLIDAYS={
  '2026-5-1':'근로자의 날','2026-5-5':'어린이날','2026-5-24':'부처님오신날','2026-5-25':'대체공휴일',
  '2026-6-3':'지방선거일','2026-6-6':'현충일','2026-7-17':'제헌절',
  '2026-8-15':'광복절','2026-8-17':'대체공휴일',
  '2026-9-24':'추석','2026-9-25':'추석','2026-9-26':'추석','2026-9-28':'대체공휴일',
  '2026-10-3':'개천절','2026-10-5':'대체공휴일','2026-10-9':'한글날','2026-12-25':'크리스마스',
  '2026-1-1':'신정','2026-2-16':'설날','2026-2-17':'설날','2026-2-18':'설날',
  '2026-3-1':'삼일절','2026-3-2':'대체공휴일',
};
function hk(y,m,d){return `${y}-${m+1}-${d}`;}
function getHol(y,m,d){return HOLIDAYS[hk(y,m,d)]||null;}
function isHol(y,m,d){return !!getHol(y,m,d);}

let records={}, curY, curM, selDate;
const today=new Date(); today.setHours(0,0,0,0);

function load(){try{records=JSON.parse(localStorage.getItem(SK)||'{}')}catch(e){records={}}}
function save(){try{localStorage.setItem(SK,JSON.stringify(records))}catch(e){}}
function parseRate(id){return Math.max(1,parseFloat(document.getElementById(id).value.replace(/,/g,''))||1);}
function rateW(){return parseRate('rate-weekday')}
function rateWE(){return parseRate('rate-weekend')}
function rateH(){return parseRate('rate-holiday')}

function setupRate(id){
  const el=document.getElementById(id);
  el.addEventListener('focus',()=>{el.value=el.value.replace(/,/g,'');el.select();});
  el.addEventListener('blur',()=>{
    const n=parseFloat(el.value.replace(/,/g,''))||0;
    el.value=Math.round(n).toLocaleString('ko-KR');
    renderCal();
  });
  el.addEventListener('keydown',(e)=>{if(e.key==='Enter')el.blur();});
}

function dateOf(y,m,d){const dt=new Date(y,m,d);dt.setHours(0,0,0,0);return dt;}
function isSat(y,m,d){return new Date(y,m,d).getDay()===6;}
function isSun(y,m,d){return new Date(y,m,d).getDay()===0;}
function isWE(y,m,d){const dw=new Date(y,m,d).getDay();return dw===0||dw===6;}
function isPast(y,m,d){return dateOf(y,m,d)<today;}
function isTdy(y,m,d){return dateOf(y,m,d).getTime()===today.getTime();}
function isBS(y,m,d){return dateOf(y,m,d)<START;}
function getRate(y,m,d){
  if(isHol(y,m,d)) return rateH();
  if(isWE(y,m,d)) return rateWE();
  return rateW();
}
function calc(start,end,y,m,d){
  const [sh,sm]=start.split(':').map(Number);
  const [eh,em]=end.split(':').map(Number);
  let mins=(eh*60+em)-(sh*60+sm);
  if(mins<0) mins+=1440; if(mins<0) mins=0;
  return {hours:mins/60, pay:(mins/60)*getRate(y,m,d)};
}
function fmtH(h){const hh=Math.floor(h),mm=Math.round((h-hh)*60);return mm>0?`${hh}h${mm}m`:`${hh}h`;}
function fmtHL(h){const hh=Math.floor(h),mm=Math.round((h-hh)*60);return mm>0?`${hh}시간 ${mm}분`:`${hh}시간`;}
function typeLbl(y,m,d){
  if(isHol(y,m,d)) return '공휴일';
  if(isSat(y,m,d)||isSun(y,m,d)) return '주말';
  return '평일';
}

function initSats(y,m){
  const key=`${y}-${m}`;
  if(!records[key]) records[key]={};
  const last=new Date(y,m+1,0).getDate();
  let sc=0;
  for(let d=1;d<=last;d++){
    if(!isSat(y,m,d)||isBS(y,m,d)) continue;
    sc++; if(sc>4) break;
    if(!records[key][d]){
      records[key][d]={status:isPast(y,m,d)||isTdy(y,m,d)?'confirmed':'scheduled',start:'09:00',end:'15:00'};
    }
  }
  if(y===2026&&m===4&&!records[key][25]){
    records[key][25]={status:'confirmed',start:'09:00',end:'15:00'};
  }
}

function autoUpgradeScheduled(){
  const key=`${curY}-${curM}`;
  const recs=records[key]||{};
  let changed=false;
  for(const d in recs){
    const r=recs[d];
    if(r.status==='scheduled' && (isPast(curY,curM,+d)||isTdy(curY,curM,+d))){
      r.status='confirmed';
      changed=true;
    }
  }
  if(changed) save();
}

function renderCal(){
  document.getElementById('month-label').textContent=`${curY}년 ${curM+1}월`;
  initSats(curY,curM);
  autoUpgradeScheduled();
  const key=`${curY}-${curM}`;
  const recs=records[key]||{};
  const grid=document.getElementById('cal-grid');
  grid.innerHTML='';
  const first=new Date(curY,curM,1).getDay();
  const last=new Date(curY,curM+1,0).getDate();
  const prevLast=new Date(curY,curM,0).getDate();
  for(let i=0;i<first;i++){
    const el=document.createElement('div');
    el.className='day other';
    el.innerHTML=`<div class="day-num">${prevLast-first+1+i}</div>`;
    grid.appendChild(el);
  }
  for(let d=1;d<=last;d++){
    const bs=isBS(curY,curM,d);
    const rec=recs[d];
    const hol=getHol(curY,curM,d);
    let cls='day';
    if(isSat(curY,curM,d)) cls+=' dsat';
    if(isSun(curY,curM,d)) cls+=' dsun';
    if(hol) cls+=' dhol';
    if(bs){cls+=' bs';}
    else if(rec){
      if(rec.status==='absent') cls+=' absent';
      else if(hol&&rec.status==='confirmed') cls+=' hw';
      else if(hol&&rec.status==='scheduled') cls+=' hs';
      else if(rec.status==='confirmed') cls+=' confirmed';
      else cls+=' scheduled';
    }
    if(isTdy(curY,curM,d)) cls+=' today';
    const el=document.createElement('div');
    el.className=cls;
    let inner=`<div class="day-num">${d}</div>`;
    if(hol&&!bs) inner+=`<div class="hol-nm">${hol}</div>`;
    if(!bs&&rec&&rec.status!=='absent'){
      const {hours,pay}=calc(rec.start,rec.end,curY,curM,d);
      const bc=hol?'p':rec.status==='confirmed'?'g':'b';
      const sp=(isPast(curY,curM,d)||isTdy(curY,curM,d))?Math.round(pay).toLocaleString()+'원':'예정';
      inner+=`<div class="dbadge ${bc}">${fmtH(hours)}<br>${sp}</div>`;
    } else if(!bs&&rec&&rec.status==='absent'){
      inner+=`<div class="dbadge r">결근</div>`;
    }
    el.innerHTML=inner;
    if(!bs) el.addEventListener('click',()=>openModal(d));
    grid.appendChild(el);
  }
  updateSummary();
  updateLog();
}

function updateSummary(){
  const key=`${curY}-${curM}`;
  const recs=records[key]||{};
  let days=0,totalH=0,conf=0,exp=0;
  for(const d in recs){
    const r=recs[d];
    if(isBS(curY,curM,+d)||r.status==='absent') continue;
    const {hours,pay}=calc(r.start,r.end,curY,curM,+d);
    days++; totalH+=hours; exp+=pay;
    if(isPast(curY,curM,+d)||isTdy(curY,curM,+d)) conf+=pay;
  }
  document.getElementById('sum-days').textContent=days+'일';
  document.getElementById('sum-hours').textContent=fmtHL(totalH);
  document.getElementById('sum-confirmed').textContent=Math.round(conf).toLocaleString()+'원';
  document.getElementById('sum-expected').textContent=Math.round(exp).toLocaleString()+'원';
}

function updateLog(){
  const key=`${curY}-${curM}`;
  const recs=records[key]||{};
  const sec=document.getElementById('log-section');
  const list=document.getElementById('log-list');
  const days=Object.keys(recs).map(Number).filter(d=>!isBS(curY,curM,d)).sort((a,b)=>a-b);
  if(!days.length){sec.style.display='none';return;}
  sec.style.display='block';
  list.innerHTML='';
  days.forEach(d=>{
    const r=recs[d];
    const hol=isHol(curY,curM,d);
    const tl=r.status==='absent'?'결근':typeLbl(curY,curM,d);
    let hs='-',ps='-';
    if(r.status!=='absent'){
      const {hours,pay}=calc(r.start,r.end,curY,curM,d);
      hs=fmtH(hours);
      ps=(isPast(curY,curM,d)||isTdy(curY,curM,d))?Math.round(pay).toLocaleString()+'원':'(예정)';
    }
    const color=r.status==='absent'?'#e24b4a':hol?'#d4537e':r.status==='confirmed'?'#1a8f60':'#185fa5';
    const row=document.createElement('div');
    row.className='log-row';
    row.innerHTML=`
      <span style="font-weight:700;color:#1a1a1a">${curM+1}/${d}</span>
      <span style="color:${color};font-weight:700">${tl}</span>
      <span style="color:#888;font-size:11px">${r.status!=='absent'?`${r.start}~${r.end}`:'-'}</span>
      <span style="color:#888">${hs}</span>
      <span style="text-align:right;font-weight:700;color:${color}">${ps}</span>`;
    list.appendChild(row);
  });
}

function openModal(d){
  selDate=d;
  const key=`${curY}-${curM}`;
  const rec=(records[key]||{})[d];
  const hol=getHol(curY,curM,d);
  document.getElementById('modal-title').textContent=`${curM+1}월 ${d}일`;
  document.getElementById('hol-tag-wrap').innerHTML=hol?`<div class="hol-tag">🎌 ${hol}</div>`:'';
  document.getElementById('inp-start').value=rec?rec.start:'09:00';
  document.getElementById('inp-end').value=rec?rec.end:(isSat(curY,curM,d)||hol?'15:00':'18:00');
  document.getElementById('inp-status').value=rec?rec.status:(isPast(curY,curM,d)||isTdy(curY,curM,d)?'confirmed':'scheduled');
  document.getElementById('m-delete').style.display=rec?'inline-block':'none';
  updatePreview();
  document.getElementById('modal').classList.add('open');
}

function updatePreview(){
  const s=document.getElementById('inp-start').value;
  const e=document.getElementById('inp-end').value;
  const sts=document.getElementById('inp-status').value;
  if(sts==='absent'){document.getElementById('modal-preview').textContent='결근 처리됩니다';return;}
  if(s&&e&&selDate!=null){
    const {hours,pay}=calc(s,e,curY,curM,selDate);
    document.getElementById('modal-preview').textContent=`${fmtHL(hours)} 근무 → ${Math.round(pay).toLocaleString()}원 (${typeLbl(curY,curM,selDate)})`;
  }
}

['inp-start','inp-end'].forEach(id=>document.getElementById(id).addEventListener('input',updatePreview));
document.getElementById('inp-status').addEventListener('change',updatePreview);

document.getElementById('m-save').addEventListener('click',()=>{
  const key=`${curY}-${curM}`;
  if(!records[key]) records[key]={};
  records[key][selDate]={status:document.getElementById('inp-status').value,start:document.getElementById('inp-start').value,end:document.getElementById('inp-end').value};
  save(); document.getElementById('modal').classList.remove('open'); renderCal();
});
document.getElementById('m-delete').addEventListener('click',()=>{
  const key=`${curY}-${curM}`;
  if(records[key]) delete records[key][selDate];
  save(); document.getElementById('modal').classList.remove('open'); renderCal();
});
document.getElementById('m-cancel').addEventListener('click',()=>{document.getElementById('modal').classList.remove('open');});
document.getElementById('modal').addEventListener('click',(e)=>{if(e.target.id==='modal') document.getElementById('modal').classList.remove('open');});
document.getElementById('prev-m').addEventListener('click',()=>{curM--;if(curM<0){curM=11;curY--;}renderCal();});
document.getElementById('next-m').addEventListener('click',()=>{curM++;if(curM>11){curM=0;curY++;}renderCal();});
['rate-weekday','rate-weekend','rate-holiday'].forEach(id=>setupRate(id));

load();
curY=today.getFullYear(); curM=today.getMonth();
renderCal();
</script>
</body>
</html>
